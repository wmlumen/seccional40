<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=public/index.html">
    <title>SECCIONAL 40 - Redirigiendo...</title>
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loading {
            text-align: center;
        }
        .loading h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }
        .loading p {
            color: #94a3b8;
        }
        .loading a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
        }
        .loading a:hover {
            text-decoration: underline;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #1e293b;
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <h1>SECCIONAL 40</h1>
        <p>Sistema de Control Electoral</p>
        <p style="margin-top: 20px; font-size: 0.9rem;">
            Si no redirige automáticamente, <a href="public/index.html">clic aquí</a>
        </p>
    </div>
</body>
</html>
