<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SECCIONAL 40 - Control de Votación</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .animate-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .grid-mesa { display: grid; gap: 4px; }
    .btn-mesa { aspect-ratio: 1; font-size: 11px; font-weight: 700; border-radius: 6px; transition: all 0.2s; }
    .btn-mesa:hover { transform: scale(1.05); }
  </style>
</head>
    <body class="min-h-screen bg-gradient-to-br from-slate-50 via-red-50 to-slate-50">
  <div id="app"></div>

  <script>
    // ==================== CONFIGURACION ====================
    const PADRON_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9_LntZNPtljJwoE3IZRMx_86hLA3SZnGAoRZHqDDJrCqrsuAZS7rHNoCdGqywcw/pub?output=csv';
    const DIRIGENTES_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9_LntZNPtljJwoE3IZRMx_86hLA3SZnGAoRZHqDDJrCqrsuAZS7rHNoCdGqywcw/pub?gid=79263661&single=true&output=csv';
    const MAX_VOTOS = 350;
    const ACCESS_PASSWORD = 'Paraguay40';
    const AUTH_SESSION_KEY = 'seccional40_auth';
    const API_URL = 'https://script.google.com/macros/s/AKfycbwMR773AI2CXSjokD7lEbjhbWSny3I4Pi8SzyuDDp0HQ-sK8UCAueu5uBRrL18K4eG_tg/exec';
    
    // ==================== ESTADO ====================
    let state = {
      autenticado: sessionStorage.getItem(AUTH_SESSION_KEY) === 'ok',
      cargando: false,
      mensaje: '',
      padron: [],
      votos: {},
      dirigentes: [],
      mesaSeleccionada: null,
      mesaBloqueada: false,
      gridColumns: 10,
      escuela: '',
      consultaCedula: '',
      consultaResultado: null,
      transferLog: [],
      showQR: false,
      veedor: 'Veedor Actual',
      veedorNombre: 'Veedor Actual',
      miembroActual: null
    };

    // ==================== LOGIN ====================
    function limpiarCedula(valor) {
      return String(valor || '').replace(/[.\s,-]/g, '').trim();
    }

    function getVotoKey(mesa, orden) {
      return `${mesa || 0}-${orden || 0}`;
    }

    function logout() {
      sessionStorage.removeItem(AUTH_SESSION_KEY);
      state.autenticado = false;
      state.miembroActual = null;
      state.veedor = 'Coordinacion';
      state.veedorNombre = 'Coordinacion';
      render();
    }

    function getBackendAccessError() {
      return 'Backend no disponible: la web app de Apps Script esta pidiendo inicio de sesion.';
    }

    async function fetchJsonOrThrow(url, options) {
      const response = await fetch(url, options);
      const text = await response.text();
      const contentType = (response.headers.get('content-type') || '').toLowerCase();
      const trimmed = text.trim().toLowerCase();

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      if (contentType.includes('text/html') || trimmed.startsWith('<!doctype html') || trimmed.startsWith('<html')) {
        throw new Error(getBackendAccessError());
      }

      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error('Respuesta invalida del backend.');
      }
    }

    function login() {
      const passwordInput = document.getElementById('passwordInput');
      const password = passwordInput ? passwordInput.value.trim() : '';
      if (!password) {
        alert('Ingresa la contrasena.');
        return;
      }

      if (password !== ACCESS_PASSWORD) {
        alert('Contrasena incorrecta.');
        return;
      }

      sessionStorage.setItem(AUTH_SESSION_KEY, 'ok');
      state.autenticado = true;
      state.miembroActual = { cedula: 'GENERAL', nombre: 'Coordinacion General', mesa: '' };
      state.veedor = 'GENERAL';
      state.veedorNombre = 'Coordinacion General';
      state.mesaBloqueada = false;
      cargarPadron();
    }

    // ==================== CARGAR PADRON DESDE CSV ====================
    async function cargarPadron() {
      state.cargando = true;
      state.mensaje = 'Cargando padrón electoral...';
      render();
      
      try {
        const response = await fetch(PADRON_CSV_URL);
        const csvText = await response.text();
        const lineas = csvText.split('\n').filter(l => l.trim());
        
        // Parsear CSV
        const registros = [];
        for (let i = 1; i < lineas.length; i++) {
          const partes = lineas[i].split(',');
          if (partes.length >= 8) {
            const cedula = partes[5].replace(/\./g, '').trim();
            const mesa = parseInt(partes[3].trim()) || 0;
            const orden = parseInt(partes[4].trim()) || 0;
            
            registros.push({
              secc: partes[0].trim(),
              num: partes[1].trim(),
              local: partes[2].trim(),
              mesa: mesa,
              orden: orden,
              cedula: cedula,
              apellido: partes[6].trim(),
              nombre: partes[7].trim(),
              nombreCompleto: (partes[6].trim() + ' ' + partes[7].trim()).trim()
            });
          }
        }
        
        state.padron = registros;
        state.cargando = false;
        state.mensaje = `Padrón cargado: ${registros.length} electores`;
        
        // Extraer nombre de escuela del primer registro
        if (registros.length > 0 && !state.escuela) {
          state.escuela = registros[0].local || '';
          sessionStorage.setItem('seccional40_escuela', state.escuela);
        }
        
        // Sugerir mesa 1 por defecto
        if (!state.mesaSeleccionada) {
          state.mesaSeleccionada = 1;
        }
        
        // Cargar votos desde la API
        await cargarVotos();
      } catch (error) {
        console.error('Error cargando padron:', error);
        state.cargando = false;
        state.mensaje = 'Error cargando padrón. Reintentando...';
        // Fallback: reintentar en 3 segundos
        setTimeout(cargarPadron, 3000);
      }
      render();
    }

    // ==================== CARGAR DIRIGENTES ====================
    async function cargarDirigentes() {
      try {
        // Intentar cargar desde la API primero (Miembros_mesa)
        const data = await fetchJsonOrThrow(API_URL + '?action=miembros_mesa_v2');
        
        if (data && data.miembros && data.miembros.length > 0) {
          state.dirigentes = data.miembros
            .filter(m => (m.estado || 'ACTIVO') === 'ACTIVO')
            .map(m => ({
              cedula: m.cedula,
              nombre: m.nombre,
              mesa: m.mesa || ''
            }));
          console.log('Miembros de mesa cargados desde API:', state.dirigentes.length);
        } else {
          // Fallback: cargar desde CSV
          const response = await fetch(DIRIGENTES_CSV_URL);
          const csvText = await response.text();
          const lineas = csvText.split('\n').filter(l => l.trim());
          
          const dirigentes = [];
          for (let i = 1; i < lineas.length; i++) {
            const partes = lineas[i].split(',');
            if (partes.length >= 2) {
              const cedula = partes[0].replace(/\./g, '').trim();
              const nombre = partes[1].trim();
              if (cedula && nombre) {
                dirigentes.push({ cedula, nombre });
              }
            }
          }
          
          state.dirigentes = dirigentes;
          console.log('Dirigentes cargados desde CSV:', dirigentes.length);
        }
      } catch (error) {
        console.error('Error cargando dirigentes:', error);
      }
    }

    // ==================== CARGAR VOTOS DESDE API ====================
    async function cargarVotos() {
      try {
        state.mensaje = 'Cargando registro de votos...';
        render();
        const data = await fetchJsonOrThrow(API_URL + '?action=votos&v=' + Date.now());
        if (data && data.registros && data.registros.length > 0) {
          let votosCargados = 0;
          data.registros.forEach(r => {
            const mesa = parseInt(r.mesa) || 0;
            const orden = parseInt(r.orden) || 0;
            // Solo cargar registros de tipo voto o ausente
            if ((r.estado === 'voto' || r.estado === 'ausente') && mesa > 0 && orden > 0) {
              const key = getVotoKey(mesa, orden);
              // No sobrescribir si ya hay un registro local más reciente
              if (!state.votos[key]) {
                state.votos[key] = {
                  tipo: r.estado,
                  timestamp: r.timestamp ? new Date(r.timestamp).getTime() : Date.now(),
                  dirigente: r.dirigente || 'API',
                  mesa: mesa,
                  orden: orden
                };
                votosCargados++;
              }
            }
          });
          console.log(`Votos cargados: ${votosCargados} registros desde API`);
          state.mensaje = `Votos sincronizados: ${votosCargados} registros`;
        } else {
          console.log('No se encontraron votos previos en la API');
          state.mensaje = 'Sin votos previos en la nube';
        }
      } catch (error) {
        console.error('Error cargando votos:', error);
        state.mensaje = '⚠️ Error cargando votos de la nube';
      }
      render();
    }

    // ==================== BUSCAR POR CEDULA ====================
    function buscarCedula() {
      const input = document.getElementById('cedulaInput');
      const cedula = input ? input.value.replace(/\D/g, '').trim() : '';
      
      if (!cedula) {
        state.consultaResultado = null;
        render();
        return;
      }
      
      const encontrado = state.padron.find(p => p.cedula === cedula);
      
      if (encontrado) {
        state.consultaResultado = {
          encontrado: true,
          cedula: encontrado.cedula,
          nombre: encontrado.nombreCompleto,
          mesa: encontrado.mesa,
          orden: encontrado.orden,
          local: encontrado.local
        };
        
        // Registrar consulta en Google Sheets
        registrarAccion({
          cedula: encontrado.cedula,
          nombre: encontrado.nombreCompleto,
          mesa: encontrado.mesa,
          orden: encontrado.orden,
          estado: 'consulta',
          accion: 'consultar'
        });
        
        // Si la mesa coincide con la seleccionada, mostrar alerta
        if (encontrado.mesa === state.mesaSeleccionada) {
          // Marcar el botón correspondiente automáticamente
          setTimeout(() => {
            const btn = document.getElementById(`btn-orden-${encontrado.orden}`);
            if (btn) {
              btn.scrollIntoView({ behavior: 'smooth', block: 'center' });
              btn.style.ring = '4px';
              btn.style.ringColor = 'red';
            }
          }, 300);
        }
      } else {
        state.consultaResultado = {
          encontrado: false,
          cedula: cedula
        };
      }
      render();
    }

    // ==================== SELECCIONAR MESA ====================
    function seleccionarMesa() {
      const input = document.getElementById('mesaInput');
      const mesa = parseInt(input ? input.value : 0);
      if (mesa > 0) {
        state.mesaSeleccionada = mesa;
        state.consultaResultado = null;
        render();
      }
    }

    function bloquearMesa() {
      if (state.mesaSeleccionada) {
        state.mesaBloqueada = true;
        render();
      }
    }

    function desbloquearMesa() {
      state.mesaBloqueada = false;
      render();
    }

    // ==================== MARCAR VOTO ====================
    function marcarVoto(orden, tipo, mesaObjetivo) {
      const mesaRegistro = parseInt(mesaObjetivo || state.mesaSeleccionada || 0);
      const votoKey = getVotoKey(mesaRegistro, orden);
      const votoActual = state.votos[votoKey];
      let nuevoEstado = {
        tipo: tipo,
        timestamp: Date.now(),
        dirigente: state.veedor || 'Dirigente',
        mesa: mesaRegistro,
        orden: orden
      };
      
      if (votoActual && votoActual.tipo !== tipo) {
        nuevoEstado.controversia = true;
      }
      
      state.votos[votoKey] = nuevoEstado;
      
      // Registrar en Google Sheets
      const elector = state.padron.find(p => p.mesa === mesaRegistro && p.orden === orden);
      if (elector) {
        registrarAccion({
          cedula: elector.cedula,
          nombre: elector.nombreCompleto,
          mesa: elector.mesa,
          orden: elector.orden,
          estado: tipo === 'voto' ? 'voto' : (nuevoEstado.controversia ? 'controversia' : tipo),
          accion: 'marcar'
        });
      }
      
      // Actualizar elector consultado si coincide
      if (state.consultaResultado && state.consultaResultado.orden === orden && state.consultaResultado.mesa === mesaRegistro) {
        state.consultaResultado.marcado = true;
      }
      render();
    }

    // ==================== TRANSFERIR POSTA ====================
    function handleTransferir() {
      state.transferLog.unshift({
        timestamp: Date.now(),
        accion: "Transferencia de Mando Generada",
        mesa: state.mesaSeleccionada
      });
      state.showQR = true;
      render();
    }

    // ==================== ESTADISTICAS ====================
    function calcularStats() {
      const vals = Object.values(state.votos).filter(v => parseInt(v.mesa) === parseInt(state.mesaSeleccionada));
      const totalVotos = vals.length;
      const controversias = vals.filter(v => v.controversia).length;
      const electoresEnMesa = state.padron.filter(p => p.mesa === state.mesaSeleccionada).length;
      return { totalVotos, controversias, electoresEnMesa };
    }

    // ==================== REGISTRAR EN GOOGLE SHEETS ====================
    async function registrarAccion(datos) {
      if (!API_URL || API_URL === '') {
        console.warn('API_URL no configurada. Datos no enviados:', datos);
        state.mensaje = '⚠️ API_URL no configurada';
        render();
        return;
      }
      try {
        console.log('Enviando datos:', datos);
        
        // Construir URL con parámetros (más confiable para GAS)
        var params = new URLSearchParams({
          action: 'registrar',
          timestamp: new Date().toISOString(),
          cedula: datos.cedula || '',
          nombre: datos.nombre || '',
          mesa: datos.mesa || '',
          orden: datos.orden || '',
          estado: datos.estado || '',
          accion: datos.accion || '',
          dirigente: state.veedor || 'Dirigente',
          dirigenteNombre: state.veedorNombre || 'Dirigente',
          origen: 'seccional40'
        });
        
        var url = API_URL + '?' + params.toString();
        console.log('URL:', url);
        
        const result = await fetchJsonOrThrow(url, {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });
        console.log('Respuesta del servidor:', result);
        
        if (!result.success) {
          console.error('Error del servidor:', result.error);
          state.mensaje = '⚠️ Error: ' + result.error;
          render();
        }
      } catch (err) {
        console.error('Error registrando en Sheets:', err);
        state.mensaje = '⚠️ Error de conexión: ' + err.message;
        render();
      }
    }

    // ==================== RENDER LOGIN ====================
    function renderLogin() {
      return `
        <div class="min-h-screen flex items-center justify-center p-4">
          <div class="bg-white rounded-[2rem] p-8 md:p-12 shadow-2xl border border-slate-100 max-w-md w-full text-center">
            <div class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
            </div>
            <h1 class="text-3xl font-black text-slate-900 uppercase tracking-tighter mb-2">SECCIONAL 40</h1>
            <p class="text-slate-500 text-sm mb-8">Sistema de Control Electoral</p>
            
             <div class="space-y-4">
              <div class="relative">
                <input type="password" id="passwordInput" placeholder="Contrasena" 
                  class="w-full px-6 py-4 text-lg font-bold border-2 border-slate-200 rounded-2xl focus:border-red-500 focus:outline-none transition-all text-center"
                  onkeypress="if(event.key === 'Enter') login()">
              </div>
              <button onclick="login()" class="w-full py-4 bg-red-600 hover:bg-red-700 text-white font-black rounded-2xl transition-all shadow-lg">
                ACCEDER
              </button>
            </div>
            
            <p class="text-xs text-slate-400 mt-6">Acceso unificado para todo el sistema</p>
          </div>
        </div>
      `;
    }

    // ==================== RENDER MAIN ====================
    function render() {
      const app = document.getElementById('app');
      
      if (!state.autenticado) {
        app.innerHTML = renderLogin();
        return;
      }
      
      const stats = calcularStats();
      const electoresMesa = state.padron.filter(p => p.mesa === state.mesaSeleccionada);
      const cantidadBotones = electoresMesa.length || MAX_VOTOS;
      
      app.innerHTML = `
        <header class="bg-red-900 text-white sticky top-0 z-40 shadow-lg">
          <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
              <div class="p-2 bg-red-500 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>
              </div>
              <div>
                <h1 class="text-xl font-black uppercase tracking-tighter italic leading-none">SECC. 40</h1>
                <p class="text-[10px] text-red-200 font-bold uppercase tracking-widest opacity-80">Control Electoral</p>
              </div>
            </div>
            
            <!-- MENÚ DE NAVEGACIÓN -->
            <div class="flex items-center gap-2 bg-red-800/50 px-3 py-1.5 rounded-xl border border-red-700">
              <span class="text-[10px] text-red-300 font-bold uppercase mr-2">📍 ${state.escuela || 'Esc. ...'}</span>
              <span class="text-[10px] text-red-300 font-bold uppercase mr-2">Colegio:</span>
              <a href="index.html" class="px-2 py-1 bg-red-600 rounded-lg text-[10px] font-bold text-white">Votación</a>
              <a href="mesas.html" class="px-2 py-1 hover:bg-red-700 rounded-lg text-[10px] font-bold text-red-200 transition-all">Mesas</a>
              <a href="No_voto.html" class="px-2 py-1 hover:bg-red-700 rounded-lg text-[10px] font-bold text-red-200 transition-all">No Voto</a>
              <a href="padron_unificado.html" class="px-2 py-1 hover:bg-red-700 rounded-lg text-[10px] font-bold text-red-200 transition-all">Padrón</a>
              <span class="text-[10px] text-red-400 mx-1">|</span>
              <span class="text-[10px] text-red-300 font-bold uppercase">PC:</span>
              <a href="anomalias.html" class="px-2 py-1 hover:bg-red-700 rounded-lg text-[10px] font-bold text-red-200 transition-all">Anomalías</a>
              <a href="asistencia.html" class="px-2 py-1 hover:bg-red-700 rounded-lg text-[10px] font-bold text-red-200 transition-all">Seguimiento</a>
            </div>
            
            <div class="flex items-center gap-2 bg-red-950/50 p-1.5 rounded-2xl border border-red-800">
              <div class="flex items-center gap-2 px-3">
                <span class="text-xs text-red-300 font-bold">MESA:</span>
                ${state.mesaBloqueada 
                  ? `<span class="text-lg font-black text-white">${state.mesaSeleccionada}</span>` 
                  : `<input type="number" id="mesaInput" value="${state.mesaSeleccionada || 1}" min="1" class="w-16 py-1 px-2 rounded-lg text-center font-black text-red-900 text-sm border-0 focus:ring-2 focus:ring-red-400">`
                }
                ${!state.mesaBloqueada 
                  ? `<button onclick="seleccionarMesa()" class="px-3 py-1 bg-red-600 hover:bg-red-500 rounded-lg text-xs font-bold text-white transition-all">CARGAR</button>
                     <button onclick="bloquearMesa()" class="px-3 py-1 bg-red-600 hover:bg-red-500 rounded-lg text-xs font-bold text-white transition-all">BLOQUEAR</button>`
                  : `<button onclick="desbloquearMesa()" class="px-3 py-1 bg-rose-600 hover:bg-rose-500 rounded-lg text-xs font-bold text-white transition-all">DESBLOQUEAR</button>`
                }
              </div>
              
              <button onclick="handleTransferir()" class="px-4 py-2 bg-red-500 hover:bg-red-400 rounded-xl text-xs font-black transition-all text-red-950 tracking-widest">
                POSTA
              </button>
            </div>
          </div>
        </header>

        <main class="max-w-7xl mx-auto p-3 md:p-6">
          ${state.cargando ? `
            <div class="text-center py-12">
              <div class="inline-block w-12 h-12 border-4 border-red-200 border-t-red-600 rounded-full animate-spin mb-4"></div>
              <p class="text-slate-500 font-bold">${state.mensaje}</p>
            </div>
          ` : `
            <div class="animate-in fade-in">
              <!-- BARRA DE CONSULTA -->
              <div class="bg-white rounded-[2rem] p-4 shadow-xl border border-slate-100 mb-4">
                <div class="flex flex-col sm:flex-row gap-3 items-center">
                  <div class="flex-1 relative w-full">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                    <input type="text" id="cedulaInput" placeholder="Ingresá cédula del elector" 
                      class="w-full pl-12 pr-4 py-3 text-lg font-bold border-2 border-slate-100 rounded-xl focus:border-red-500 focus:outline-none transition-all"
                      onkeypress="if(event.key === 'Enter') buscarCedula()">
                  </div>
                  <button onclick="buscarCedula()" class="px-8 py-3 bg-red-600 hover:bg-red-700 text-white font-black rounded-xl transition-all shadow-lg flex items-center gap-2 whitespace-nowrap">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    BUSCAR
                  </button>
                </div>
                
                ${state.consultaResultado ? renderConsultaResultado() : ''}
              </div>

              <!-- ESTADISTICAS -->
              <div class="grid grid-cols-3 gap-3 mb-4">
                <div class="bg-white p-4 rounded-[1.5rem] shadow-lg border border-slate-100 text-center">
                  <p class="text-[10px] uppercase font-black text-slate-400 tracking-widest">Electores</p>
                  <span class="text-2xl font-black text-slate-900">${cantidadBotones}</span>
                </div>
                <div class="bg-red-600 p-4 rounded-[1.5rem] shadow-lg text-white text-center">
                  <p class="text-[10px] uppercase font-black text-red-200 tracking-widest">Votos</p>
                  <span class="text-2xl font-black">${stats.totalVotos}</span>
                </div>
                <div class="${stats.controversias > 0 ? 'bg-rose-600 text-white' : 'bg-white text-slate-900'} p-4 rounded-[1.5rem] shadow-lg border ${stats.controversias > 0 ? 'border-rose-500' : 'border-slate-100'} text-center">
                  <p class="text-[10px] uppercase font-black ${stats.controversias > 0 ? 'text-rose-200' : 'text-slate-400'} tracking-widest">Controversias</p>
                  <span class="text-2xl font-black">${stats.controversias}</span>
                </div>
              </div>

              <!-- CONTROL DE COLUMNAS -->
              <div class="bg-white p-3 rounded-[2rem] shadow-2xl border border-slate-100 mb-4">
                <div class="flex flex-wrap items-center justify-between gap-3">
                  <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Columnas:</span>
                    ${[10, 20, 30, 40, 50].map(n => `
                      <button onclick="state.gridColumns=${n}; render();"
                        class="px-3 py-1 text-xs font-bold rounded-lg transition-all ${state.gridColumns === n ? 'bg-red-600 text-white shadow' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}">
                        ${n}
                      </button>
                    `).join('')}
                  </div>
                  <div class="flex items-center gap-2">
                    <span class="text-[10px] text-slate-400 font-bold">${cantidadBotones} electores</span>
                  </div>
                </div>
              </div>

              <!-- GRID DE BOTONES -->
              <div class="bg-white p-4 rounded-[2rem] shadow-2xl border border-slate-100">
                <div class="grid-mesa" style="grid-template-columns: repeat(${Math.min(state.gridColumns, cantidadBotones || 1)}, 1fr)">
                  ${Array.from({ length: cantidadBotones }, (_, i) => {
                    const orden = i + 1;
                    const voto = state.votos[getVotoKey(state.mesaSeleccionada, orden)];
                    const elector = electoresMesa.find(e => e.orden === orden);
                    
                    let btnClass = "bg-white text-slate-400 border border-slate-200 hover:border-red-300 hover:text-red-600";
                    
                    if (voto?.controversia) {
                      btnClass = "bg-rose-600 text-white font-black border-rose-700";
                    } else if (voto?.tipo === 'voto') {
                      btnClass = "bg-red-500 text-white font-bold border-red-600";
                    } else if (voto?.tipo === 'ausente') {
                      btnClass = "bg-slate-200 text-slate-500 font-bold border-slate-300";
                    } else if (elector) {
                      btnClass = "bg-red-50 text-red-400 border border-red-200 font-bold";
                    }
                    
                    const tooltip = elector ? `title="${elector.nombreCompleto}"` : '';
                    
                    return `
                      <div class="relative group">
                        <button id="btn-orden-${orden}" onclick="mostrarOpcionesVoto(${orden})" 
                          class="btn-mesa w-full ${btnClass}" ${tooltip}>
                          ${orden}
                        </button>
                        ${elector ? `
                          <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-1 px-2 py-1 bg-slate-900 text-white text-[9px] rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap z-10">
                            ${elector.nombreCompleto}
                          </div>
                        ` : ''}
                      </div>
                    `;
                  }).join('')}
                </div>
                
                <div class="mt-4 flex flex-wrap gap-3 justify-center text-xs">
                  <div class="flex items-center gap-1"><div class="w-4 h-4 bg-white border border-slate-200 rounded"></div><span>Sin marcar</span></div>
                  <div class="flex items-center gap-1"><div class="w-4 h-4 bg-red-50 border border-red-200 rounded"></div><span>En padrón</span></div>
                  <div class="flex items-center gap-1"><div class="w-4 h-4 bg-red-500 rounded"></div><span>Votó</span></div>
                  <div class="flex items-center gap-1"><div class="w-4 h-4 bg-slate-200 rounded"></div><span>Ausente</span></div>
                  <div class="flex items-center gap-1"><div class="w-4 h-4 bg-rose-600 rounded"></div><span>Controversia</span></div>
                </div>
              </div>
            </div>
          `}
        </main>

        ${state.showQR ? renderQRModal() : ''}
        ${state.mostrarOpciones ? renderOpcionesModal() : ''}
      `;
      
      lucide.createIcons();
    }

    // ==================== RESULTADO DE CONSULTA ====================
    function renderConsultaResultado() {
      const r = state.consultaResultado;
      if (!r.encontrado) {
        return `
          <div class="mt-3 bg-rose-50 border-2 border-rose-100 rounded-xl p-4 flex items-center gap-3 animate-in">
            <div class="p-2 bg-rose-100 rounded-full text-rose-600">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
            </div>
            <div>
              <p class="font-black text-rose-800 text-sm">Cédula no encontrada</p>
              <p class="text-xs text-rose-600">${r.cedula} no está en el padrón</p>
            </div>
          </div>
        `;
      }
      
      const esMesaActual = r.mesa === state.mesaSeleccionada;
      
      return `
        <div class="mt-3 ${esMesaActual ? 'bg-red-50 border-red-100' : 'bg-red-50 border-red-100'} border-2 rounded-xl p-4 flex items-center gap-3 animate-in">
          <div class="p-2 ${esMesaActual ? 'bg-red-100 text-red-600' : 'bg-red-100 text-red-600'} rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
          </div>
          <div class="flex-1">
            <p class="font-black ${esMesaActual ? 'text-red-800' : 'text-red-800'} text-sm">${r.nombre}</p>
            <div class="flex gap-3 text-xs mt-1">
              <span class="${esMesaActual ? 'text-red-600' : 'text-red-600'} font-bold">Cédula: ${r.cedula}</span>
              <span class="font-bold text-slate-500">Mesa: ${r.mesa}</span>
              <span class="font-bold text-slate-500">Orden: ${r.orden}</span>
            </div>
            ${!esMesaActual ? `<p class="text-xs text-red-700 mt-1 font-bold">⚠️ Esta persona vota en la MESA ${r.mesa}, no en esta mesa</p>` : ''}
          </div>
          <button onclick="marcarVoto(${r.orden}, 'voto', ${r.mesa}); state.consultaResultado=null; render();" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg text-xs transition-all">
            ${esMesaActual ? 'MARCAR VOTO' : 'REGISTRAR EN SU MESA'}
          </button>
        </div>
      `;
    }

    // ==================== MODAL DE OPCIONES ====================
    function mostrarOpcionesVoto(orden) {
      state.mostrarOpciones = { orden };
      render();
    }
    
    function renderOpcionesModal() {
      const { orden } = state.mostrarOpciones;
      const elector = state.padron.find(p => p.mesa === state.mesaSeleccionada && p.orden === orden);
      
      return `
        <div class="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" onclick="state.mostrarOpciones=null; render();">
          <div class="bg-white rounded-[2rem] w-full max-w-sm p-6 shadow-2xl animate-in" onclick="event.stopPropagation()">
            <div class="text-center mb-6">
              <span class="text-4xl font-black text-red-900">${orden}</span>
              ${elector ? `<p class="text-sm font-bold text-slate-600 mt-1">${elector.nombreCompleto}</p>` : ''}
            </div>
            
            <div class="space-y-3">
              <button onclick="marcarVoto(${orden}, 'voto'); state.mostrarOpciones=null; render();" 
                class="w-full flex items-center justify-center gap-3 p-4 bg-red-50 hover:bg-red-100 border-2 border-red-200 rounded-[1.5rem] transition-all font-black text-red-800">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
                VOTÓ
              </button>
              
              <button onclick="marcarVoto(${orden}, 'ausente'); state.mostrarOpciones=null; render();" 
                class="w-full flex items-center justify-center gap-3 p-4 bg-slate-50 hover:bg-slate-100 border-2 border-slate-200 rounded-[1.5rem] transition-all font-black text-slate-700">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                AUSENTE
              </button>
              
              <button onclick="state.mostrarOpciones=null; render();" 
                class="w-full py-3 text-slate-400 hover:text-slate-600 font-bold text-sm transition-all">
                CANCELAR
              </button>
            </div>
          </div>
        </div>
      `;
    }

    // ==================== QR MODAL ====================
    function renderQRModal() {
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent('https://wmlumen.github.io/seccional40/?mesa=' + state.mesaSeleccionada)}`;
      return `
        <div class="fixed inset-0 bg-slate-900/90 backdrop-blur-2xl z-[100] flex items-center justify-center p-6">
          <div class="bg-white rounded-[3rem] p-8 max-w-md w-full text-center shadow-2xl animate-in">
            <h2 class="text-2xl font-black text-slate-900 mb-2 uppercase tracking-tighter">Pasar Posta</h2>
            <p class="text-sm text-slate-500 mb-6">Mesa ${state.mesaSeleccionada}</p>
            <div class="bg-slate-50 p-8 rounded-[2rem] inline-block mb-6 border-2 border-dashed border-slate-300">
              <img src="${qrUrl}" alt="QR" class="w-48 h-48 mx-auto">
            </div>
            <button onclick="state.showQR=false; render()" class="w-full py-4 bg-red-600 hover:bg-red-700 text-white font-black rounded-2xl text-sm tracking-widest shadow-xl">
              CERRAR
            </button>
          </div>
        </div>
      `;
    }

    // ==================== INICIALIZAR ====================
    // Cargar dirigentes al inicio
    cargarDirigentes();
    if (state.autenticado) {
      state.miembroActual = { cedula: 'GENERAL', nombre: 'Coordinacion General', mesa: '' };
      state.veedor = 'GENERAL';
      state.veedorNombre = 'Coordinacion General';
      cargarPadron();
    } else {
      render();
    }
  </script>
</body>
</html>
