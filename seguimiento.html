<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SECCIONAL 40 - Seguimiento de Cargas</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --brand: #dc2626;
      --brand-dark: #991b1b;
      --bg: #fef2f2;
      --card: #ffffff;
      --line: #fecaca;
      --text: #450a0a;
      --muted: #7f1d1d;
      --shadow: 0 4px 20px rgba(127,29,29,0.08);
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .shell { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .login-card { width: min(400px,100%); padding: 36px 28px; text-align: center; }
    .login-icon {
      width: 64px; height: 64px; border-radius: 20px;
      display: grid; place-items: center; margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark)); color: #fff; font-size: 26px;
    }
    .title { font-size: clamp(22px, 3.5vw, 36px); font-weight: 900; line-height: 0.95; letter-spacing: -0.03em; text-transform: uppercase; }
    .sub { margin-top: 8px; color: var(--muted); font-size: 13px; }
    input, select {
      width: 100%; border: 2px solid var(--line); border-radius: 12px; padding: 10px 14px;
      font-size: 14px; font-weight: 600; background: #fff; color: var(--text);
    }
    input:focus, select:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(220,38,38,0.15); }
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border: none;
      border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.15s;
      background: var(--brand); color: #fff;
    }
    .btn:hover { background: var(--brand-dark); transform: translateY(-1px); }
    .btn-sm { padding: 6px 14px; font-size: 11px; border-radius: 8px; }
    .btn-outline { background: transparent; border: 2px solid var(--line); color: var(--text); }
    .btn-outline:hover { background: #fff; border-color: var(--brand); }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; }
    .stat-card { text-align: center; padding: 12px 8px; }
    .stat-label { font-size: 9px; text-transform: uppercase; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; }
    .stat-value { font-size: 22px; font-weight: 900; margin-top: 2px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 10px 8px; text-align: left; font-size: 10px; text-transform: uppercase; color: var(--muted); font-weight: 700; border-bottom: 2px solid var(--line); }
    td { padding: 10px 8px; border-bottom: 1px solid #fee2e2; }
    tr:hover td { background: #fff5f5; }
    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .badge-red { background: #fef2f2; color: var(--brand); }
    .badge-green { background: #f0fdf4; color: #16a34a; }
    .badge-blue { background: #eff6ff; color: #2563eb; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .record-row { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; padding: 14px 16px; border-bottom: 1px solid #fee2e2; }
    .record-row:last-child { border-bottom: none; }
    .record-time { font-size: 11px; color: var(--muted); font-weight: 600; white-space: nowrap; }
    .record-mesa { font-size: 11px; font-weight: 700; }
    .record-ci { font-size: 15px; font-weight: 900; letter-spacing: 0.5px; }
    .record-orden { font-size: 11px; color: var(--muted); }
    .mesa-tab { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; border: 2px solid var(--line); background: #fff; transition: all 0.15s; }
    .mesa-tab.active { border-color: var(--brand); background: var(--brand); color: #fff; }
    .mesa-tab:hover:not(.active) { border-color: var(--brand); }
    .search-box { position: relative; }
    .search-box i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
    .search-box input { padding-left: 36px; }
    @media (max-width: 640px) {
      .stat-grid { grid-template-columns: repeat(3, 1fr); }
      .shell { padding: 10px; }
    }
    @media print { .no-print { display: none !important; } body { background: #fff; } }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwMR773AI2CXsjokD7lEbjhbWSny3I4Pi8SzyuDDp0HQ-sK8UCAueu5uBRrL18K4eG_tg/exec';
    const PW = 'Paraguay40';
    const AUTH_KEY = 'seccional40_auth';
    const NIVEL_KEY = 'seccional40_nivel';

    function getNivel() { return sessionStorage.getItem(NIVEL_KEY) || ''; }
    function estaAutenticado() { return !!sessionStorage.getItem(AUTH_KEY); }

    let state = {
      autenticado: estaAutenticado(),
      cargando: false,
      mensaje: '',
      respuestas: [],
      mesas: [],
      filtroMesa: null,
      busqueda: '',
      detalleMesa: null
    };

    // ============ AUTH ============
    function login() {
      const p = document.getElementById('pw')?.value?.trim();
      if (p !== PW) { alert('Contraseña incorrecta.'); return; }
      sessionStorage.setItem(NIVEL_KEY, 'colegio');
      sessionStorage.setItem(AUTH_KEY, 'ok');
      state.autenticado = true;
      cargarDatos();
    }

    function logout() {
      sessionStorage.removeItem(NIVEL_KEY);
      sessionStorage.removeItem(AUTH_KEY);
      state.autenticado = false;
      render();
    }

    // ============ FETCH ============
    async function fetchJsonOrThrow(url, opts) {
      const r = await fetch(url, opts);
      const t = await r.text();
      const ct = (r.headers.get('content-type') || '').toLowerCase();
      if (!r.ok) throw new Error('HTTP ' + r.status);
      if (ct.includes('text/html') || t.trim().toLowerCase().startsWith('<!doctype')) throw new Error('Backend no disponible.');
      try { return JSON.parse(t); } catch (e) { throw new Error('Respuesta inválida.'); }
    }

    // ============ CARGAR DATOS ============
    async function cargarDatos() {
      state.cargando = true;
      state.mensaje = 'Cargando registros...';
      render();

      try {
        const data = await fetchJsonOrThrow(API_URL + '?action=votos&v=' + Date.now());
        if (!data || !data.registros) throw new Error('No se pudieron cargar los registros');

        state.respuestas = data.registros.map((r, i) => {
          const mesa = parseInt(r.mesa) || 0;
          const orden = parseInt(r.orden) || 0;
          const cedula = (r.cedula || '').toString().trim();
          const ts = r.marcaTemporal || r.fecha || '';
          return { id: i + 1, mesa, orden, cedula, ts, fila: i + 1 };
        });

        // Agrupar por mesa
        const map = {};
        state.respuestas.forEach(item => {
          if (!map[item.mesa]) map[item.mesa] = [];
          map[item.mesa].push(item);
        });
        state.mesas = Object.keys(map).sort((a, b) => parseInt(a) - parseInt(b)).map(m => {
          const items = map[m];
          const cedulasUnicas = new Set(items.map(x => x.cedula));
          const ultimo = items.reduce((a, b) => a.ts > b.ts ? a : b);
          return {
            mesa: parseInt(m),
            registros: items,
            total: items.length,
            cedulasUnicas: cedulasUnicas.size,
            ultimoRegistro: ultimo
          };
        });

        state.cargando = false;
        state.mensaje = `Registros cargados: ${state.respuestas.length}`;
      } catch (e) {
        state.cargando = false;
        state.mensaje = '⚠ Error: ' + (e.message || 'No se pudieron cargar datos');
      }
      render();
    }

    // ============ FILTROS ============
    function setFiltroMesa(mesa) {
      state.filtroMesa = state.filtroMesa === mesa ? null : mesa;
      state.detalleMesa = null;
      render();
    }

    function setBusqueda(v) {
      state.busqueda = v.toLowerCase();
      state.detalleMesa = null;
      render();
    }

    function verDetalle(mesa) {
      state.detalleMesa = state.detalleMesa === mesa ? null : mesa;
      render();
    }

    function formatTime(ts) {
      if (!ts) return '—';
      try {
        const d = new Date(ts);
        if (isNaN(d.getTime())) return ts;
        const h = String(d.getHours()).padStart(2, '0');
        const m = String(d.getMinutes()).padStart(2, '0');
        return h + ':' + m;
      } catch (e) { return ts; }
    }

    function formatDate(ts) {
      if (!ts) return '—';
      try {
        const d = new Date(ts);
        if (isNaN(d.getTime())) return ts;
        return d.toLocaleDateString('es-PY', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ' ' +
               d.toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      } catch (e) { return ts; }
    }

    // ============ RENDER ============
    function renderLogin() {
      return `
        <div class="login-wrap">
          <div class="login-card card">
            <div class="login-icon"><i class="fas fa-clipboard-list"></i></div>
            <h1 class="title">SEGUIMIENTO</h1>
            <p class="sub">Cargas de Votaci&oacute;n &middot; SECCIONAL 40</p>
            <div style="margin-top:20px;display:flex;flex-direction:column;gap:10px;">
              <input type="password" id="pw" placeholder="Contrase&ntilde;a" onkeypress="if(event.key==='Enter') login()">
              <button class="btn" onclick="login()" style="justify-content:center;">ACCEDER</button>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      const app = document.getElementById('app');
      if (!state.autenticado) { app.innerHTML = renderLogin(); return; }

      // Filtrar
      let items = [...state.respuestas];
      if (state.filtroMesa) items = items.filter(i => i.mesa === state.filtroMesa);
      if (state.busqueda) {
        const q = state.busqueda;
        items = items.filter(i =>
          String(i.mesa).includes(q) ||
          i.cedula.includes(q) ||
          String(i.orden).includes(q) ||
          (i.ts || '').toLowerCase().includes(q)
        );
      }
      items.sort((a, b) => (b.ts || '') > (a.ts || '') ? 1 : -1);

      const cedulasUnicas = new Set(state.respuestas.map(x => x.cedula));
      const ultimoReg = state.respuestas.reduce((a, b) => (a.ts || '') > (b.ts || '') ? a : b, { ts: '' });

      const mesasVisibles = state.filtroMesa
        ? [state.mesas.find(m => m.mesa === state.filtroMesa)].filter(Boolean)
        : state.mesas;

      app.innerHTML = `
        <div class="shell">
          <!-- HEADER -->
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--brand-dark));display:grid;place-items:center;color:#fff;font-size:18px;">
                <i class="fas fa-clipboard-list"></i>
              </div>
              <div>
                <h1 style="font-size:20px;font-weight:900;text-transform:uppercase;letter-spacing:-0.02em;">SEGUIMIENTO</h1>
                <p style="font-size:11px;color:var(--muted);">Cargas de Votaci&oacute;n &middot; SECCIONAL 40</p>
              </div>
            </div>
            <div style="display:flex;gap:6px;">
              <button class="btn btn-sm" onclick="cargarDatos()"><i class="fas fa-sync-alt ${state.cargando ? 'fa-spin' : ''}"></i> Recargar</button>
              <button class="btn btn-sm btn-outline" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</button>
            </div>
          </div>

          ${state.cargando ? `
            <div style="text-align:center;padding:40px;">
              <div style="width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 12px;"></div>
              <p style="color:var(--muted);font-weight:600;font-size:13px;">${state.mensaje}</p>
            </div>
          ` : `
            <!-- STATS -->
            <div class="stat-grid card" style="padding:14px;margin-bottom:14px;">
              <div class="stat-card"><div class="stat-label">Registros</div><div class="stat-value">${state.respuestas.length}</div></div>
              <div class="stat-card"><div class="stat-label">C&eacute;dulas &uacute;nicas</div><div class="stat-value">${cedulasUnicas.size}</div></div>
              <div class="stat-card"><div class="stat-label">Mesas con carga</div><div class="stat-value">${state.mesas.length}</div></div>
              <div class="stat-card"><div class="stat-label">&Uacute;ltimo registro</div><div class="stat-value" style="font-size:12px;font-weight:700;">${formatDate(ultimoReg.ts)}</div></div>
            </div>

            ${state.mensaje ? `
              <div style="background:#fef2f2;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;font-weight:600;color:var(--muted);">${state.mensaje}</div>
            ` : ''}

            <!-- FILTROS -->
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center;">
              <div class="search-box" style="flex:1;min-width:160px;">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Buscar por mesa, c&eacute;dula, orden o fecha" value="${state.busqueda}"
                  oninput="setBusqueda(this.value)">
              </div>
              <button class="btn btn-sm ${!state.filtroMesa ? 'btn-outline' : ''}" onclick="setFiltroMesa(null)" style="${!state.filtroMesa ? 'border-color:var(--brand);color:var(--brand);' : ''}">
                <i class="fas fa-th-large"></i> Todas
              </button>
              ${state.mesas.slice(0, 10).map(m =>
                `<button class="btn btn-sm ${state.filtroMesa === m.mesa ? '' : 'btn-outline'}" onclick="setFiltroMesa(${m.mesa})" style="${state.filtroMesa === m.mesa ? '' : ''}">
                  <i class="fas fa-table"></i> Mesa ${m.mesa}
                </button>`
              ).join('')}
              ${state.mesas.length > 10 ? `<span style="font-size:11px;color:var(--muted);font-weight:600;">+${state.mesas.length - 10} mas</span>` : ''}
            </div>

            <!-- TABLA RESUMEN POR MESA -->
            <div class="card fade-in" style="margin-bottom:14px;overflow:hidden;">
              <div style="padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
                <h2 style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:-0.01em;">
                  <i class="fas fa-layer-group" style="margin-right:6px;color:var(--brand);"></i>
                  Resumen por mesa
                </h2>
                <span style="font-size:11px;color:var(--muted);font-weight:600;">
                  ${mesasVisibles.length} mesa(s) visibles sobre ${state.mesas.length} con registros
                </span>
              </div>
              <div style="overflow-x:auto;">
                <table>
                  <thead>
                    <tr>
                      <th>Mesa</th>
                      <th>Registros</th>
                      <th>C&eacute;dulas</th>
                      <th>&Uacute;ltimo registro</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    ${mesasVisibles.length > 0 ? mesasVisibles.map(m => `
                      <tr style="cursor:pointer;" onclick="verDetalle(${m.mesa})">
                        <td><strong>Mesa ${m.mesa}</strong></td>
                        <td><span class="badge badge-red">${m.total}</span></td>
                        <td><span class="badge badge-blue">${m.cedulasUnicas}</span></td>
                        <td style="font-size:12px;color:var(--muted);">${formatDate(m.ultimoRegistro.ts)}</td>
                        <td style="text-align:right;">
                          <i class="fas ${state.detalleMesa === m.mesa ? 'fa-chevron-up' : 'fa-chevron-down'}" style="color:var(--muted);font-size:12px;"></i>
                        </td>
                      </tr>
                      ${state.detalleMesa === m.mesa ? `
                        <tr>
                          <td colspan="5" style="padding:0;">
                            <div style="background:#fefcfc;">
                              <div style="padding:14px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--line);">
                                <div style="display:flex;gap:16px;font-size:12px;">
                                  <span><strong>Registros:</strong> ${m.total}</span>
                                  <span><strong>C&eacute;dulas &uacute;nicas:</strong> ${m.cedulasUnicas}</span>
                                  <span><strong>&Uacute;ltimo env&iacute;o:</strong> ${formatDate(m.ultimoRegistro.ts)}</span>
                                </div>
                              </div>
                              ${[...m.registros].sort((a, b) => (b.ts || '') > (a.ts || '') ? 1 : -1).map(item => `
                                <div class="record-row fade-in">
                                  <div>
                                    <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;">Mesa ${item.mesa}</div>
                                  </div>
                                  <div>
                                    <div class="record-ci">${item.cedula}</div>
                                    <div class="record-orden">Orden ${item.orden}</div>
                                  </div>
                                  <div class="record-time">
                                    <i class="fas fa-clock" style="margin-right:4px;"></i>${formatTime(item.ts)}
                                  </div>
                                </div>
                              `).join('')}
                            </div>
                          </td>
                        </tr>
                      ` : ''}
                    `).join('') : `
                      <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--muted);font-weight:600;">Sin resultados para los filtros aplicados</td></tr>
                    `}
                  </tbody>
                </table>
              </div>
            </div>

            <!-- VISTA GENERAL DE TODOS LOS REGISTROS -->
            <div class="card fade-in">
              <div style="padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
                <h2 style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:-0.01em;">
                  <i class="fas fa-list" style="margin-right:6px;color:var(--brand);"></i>
                  Todos los registros
                </h2>
                <span style="font-size:11px;color:var(--muted);font-weight:600;">${items.length} registro(s) &middot; ordenado del m&aacute;s reciente</span>
              </div>
              <div style="overflow-x:auto;">
                <table>
                  <thead>
                    <tr>
                      <th>Mesa</th>
                      <th>Orden</th>
                      <th>C&eacute;dula</th>
                      <th>Hora</th>
                      <th>Fecha</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${items.length > 0 ? items.map(i => `
                      <tr>
                        <td><strong>${i.mesa}</strong></td>
                        <td>${i.orden}</td>
                        <td style="font-weight:700;font-size:14px;letter-spacing:0.5px;">${i.cedula}</td>
                        <td><span class="badge badge-blue">${formatTime(i.ts)}</span></td>
                        <td style="font-size:11px;color:var(--muted);">${formatDate(i.ts)}</td>
                      </tr>
                    `).join('') : `
                      <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--muted);font-weight:600;">Sin registros</td></tr>
                    `}
                  </tbody>
                </table>
              </div>
            </div>

            <!-- FOOTER -->
            <div style="text-align:center;margin-top:20px;padding:12px;font-size:11px;color:var(--muted);">
              <p>Vista construida sobre los registros de <strong>Votaci&oacute;n</strong>. Muestra las cargas registradas con <strong>C&eacute;dula</strong>, <strong>Mesa</strong> y <strong>Orden</strong>.</p>
              <p style="margin-top:4px;"><span class="badge badge-red">Fuente: API Registros</span></p>
            </div>
          `}
        </div>
        <style>
          @keyframes spin { to { transform: rotate(360deg); } }
        </style>
      `;
    }

    // ============ INIT ============
    if (state.autenticado) { cargarDatos(); } else { render(); }
  </script>
</body>
</html>
