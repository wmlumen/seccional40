<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SECCIONAL 40 - Escrutinio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: Arial, sans-serif; background: #f3f4f6; }
    /* Certificado */
    .certificado { font-family: Arial, sans-serif; color: #333; }
    .certificado h1 { font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 2px; }
    .certificado h2 { font-size: 16px; font-weight: bold; text-align: center; margin-bottom: 2px; }
    .certificado .header { text-align: center; margin-bottom: 12px; }
    .certificado .info-box { border: 1px solid #ccc; padding: 8px 12px; background: #fff; margin-bottom: 12px; font-size: 12px; }
    .certificado table { width: 100%; border-collapse: collapse; margin-bottom: 10px; background: #fff; font-size: 12px; }
    .certificado table, .certificado th, .certificado td { border: 1px solid #000; }
    .certificado th, .certificado td { padding: 6px 8px; text-align: center; }
    .certificado .signatures { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; }
    .certificado .signature-block { flex: 1; border: 1px solid #ccc; padding: 8px 12px; background: #fff; font-size: 11px; }
    .certificado .footer-note { text-align: center; margin-top: 16px; font-size: 0.85em; color: #666; }

    /* TSJE-style table */
    .tsje-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; background: #fff; font-size: 13px; }
    .tsje-table th, .tsje-table td { padding: 8px 10px; text-align: center; }
    .tsje-table thead th { background: #343a40; color: #fff; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .tsje-table tbody tr { border-bottom: 1px solid #e2e8f0; }
    .tsje-table tbody tr:hover { background: #f8fafc; }
    .tsje-table .color-bar { width: 4px; padding: 0; }
    .tsje-stat { background: #fff; border-radius: 8px; padding: 10px 14px; text-align: center; border: 1px solid #e2e8f0; }
    .tsje-stat .label { font-size: 10px; text-transform: uppercase; font-weight: 700; color: #64748b; letter-spacing: 0.5px; }
    .tsje-stat .value { font-size: 20px; font-weight: 900; color: #1e293b; margin-top: 2px; }

    .focus-ring:focus { outline: none; box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.3); border-color: #dc2626; }
    @media print { .no-print { display: none !important; } body { background: white; } }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwMR773AI2CXsjokD7lEbjhbWSny3I4Pi8SzyuDDp0HQ-sK8UCAueu5uBRrL18K4eG_tg/exec';
    const PADRON_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9_LntZNPtljJwoE3IZRMx_86hLA3SZnGAoRZHqDDJrCqrsuAZS7rHNoCdGqywcw/pub?output=csv';
    const PW_PC = 'Paraguay100';
    const AUTH_SESSION_KEY = 'seccional40_auth';
    const NIVEL_SESSION_KEY = 'seccional40_nivel';

    function getNivel() { return sessionStorage.getItem(NIVEL_SESSION_KEY) || ''; }
    function estaAutenticado() { return getNivel() === 'pc'; }

    // ============ AGRUPACIONES POR TIPO ============
    const AGRUPACIONES_INTENDENTE = [
      { nro: 1, nombre: 'ANR - Movimiento Colorado Añetete', color: '#6b7280' },
      { nro: 2, nombre: 'Honor Colorado', color: '#d32f2f' },
      { nro: 3, nombre: 'Movimiento Democrático Republicano', color: '#7c3aed' },
      { nro: 4, nombre: 'Nueva Mayoría Republicana', color: '#f59e0b' },
      { nro: 5, nombre: 'Fuerza Republicana Integración', color: '#0891b2' },
      { nro: 6, nombre: 'Unión Nacional Republicana', color: '#059669' },
      { nro: 7, nombre: 'Fuerza y Causa Republicana por Asunción', color: '#1976d2' },
      { nro: 8, nombre: 'Movimiento Republicano Independiente', color: '#d946ef' },
      { nro: 9, nombre: 'Alternativa Republicana', color: '#f97316' },
      { nro: 10, nombre: 'Compromiso Republicano', color: '#64748b' },
      { nro: 300, nombre: 'Universitario Estudiantil', color: '#388e3c' }
    ];

    const AGRUPACIONES_JUNTA = [
      { nro: 201, nombre: 'Lista 2A - Honor Colorado A', color: '#d32f2f' },
      { nro: 202, nombre: 'Lista 2B - Honor Colorado B', color: '#1976d2' },
      { nro: 210, nombre: 'Lista 2K - Honor Colorado K', color: '#388e3c' },
      { nro: 4, nombre: 'Lista 4 - Fuerza Republicana', color: '#fbc02d' },
      { nro: 5, nombre: 'Lista 5 - Causa Republicana', color: '#7b1fa2' },
      { nro: 6, nombre: 'Lista 6 - Colorado Añetete', color: '#0097a7' }
    ];

    // ============ PREFERENCIAS (Junta Municipal) ============
    const PREFERENCIAS_DATA = {
      201: [
        { orden: 1, nombre: 'Venus Nuñez', votos: 1829 },
        { orden: 2, nombre: 'Negro Nuñez', votos: 1111 },
        { orden: 4, nombre: 'Tono Sosa', votos: 463 },
        { orden: 6, nombre: 'Gonzalito', votos: 427 },
        { orden: 10, nombre: 'Dr. Ariel Escandriolo Doctorcito', votos: 352 },
        { orden: 3, nombre: 'Ema Gomez', votos: 297 },
        { orden: 5, nombre: 'Tutu Gimenez', votos: 269 },
        { orden: 9, nombre: 'Lili Irala', votos: 227 },
        { orden: 12, nombre: 'Lidia Evers', votos: 167 },
        { orden: 7, nombre: 'Liza Ferreira', votos: 104 },
        { orden: 11, nombre: 'Lic. Gloria Alvarenga', votos: 76 },
        { orden: 8, nombre: 'Kristel Pinho', votos: 60 }
      ]
    };

    function getPreferencias(listaNro) {
      const d = state.preferencias[listaNro] || PREFERENCIAS_DATA[listaNro] || [];
      return d.sort((a, b) => (a.orden || 0) - (b.orden || 0));
    }

    function getAgrupaciones() {
      return state.tipo === 'junta' ? AGRUPACIONES_JUNTA : AGRUPACIONES_INTENDENTE;
    }

    function getTipoLabel() {
      return state.tipo === 'junta' ? 'Junta Municipal' : 'Intendente Municipal';
    }

    function getTipoSlug() {
      return state.tipo === 'junta' ? 'junta' : 'intendente';
    }

    // ============ ESTADO ============
    let state = {
      autenticado: estaAutenticado(),
      cargando: false,
      tipo: 'intendente',    // 'intendente' | 'junta'
      mesa: 12,
      mesas: [],
      electoresPorMesa: {},
      totalElectores: 0,
      totalVotosSistema: 0,
      totalRegistros: 0,
      mensaje: '',
      escrutinio: { votos: {}, nulos: 0, blanco: 0, vac: 0 },
      editMode: false,
      vista: 'certificado',  // 'certificado' | 'contraste' | 'general'
      general: {
        intendente: { mesasInstaladas: 0, mesasProcesadas: 0, votosSistema: 0, votosLista2: 0, votosLista7: 0, votosLista300: 0, nulos: 0, blanco: 0, vac: 0 },
        junta: { mesasInstaladas: 0, mesasProcesadas: 0, votosSistema: 0, votosLista2A: 0, votosLista2B: 0, votosLista2K: 0, votosLista4: 0, votosLista5: 0, votosLista6: 0, nulos: 0, blanco: 0, vac: 0 }
      },
      preferencias: JSON.parse(JSON.stringify(PREFERENCIAS_DATA)),
      preferenciasLista: null  // lista nro being viewed/edited
    };

    // Init escrutinio votos
    function initEscrutinioVotos() {
      state.escrutinio.votos = {};
      getAgrupaciones().forEach(a => { state.escrutinio.votos[a.nro] = 0; });
      state.escrutinio.nulos = 0;
      state.escrutinio.blanco = 0;
      state.escrutinio.vac = 0;
    }
    initEscrutinioVotos();

    function getGeneral() {
      return state.general[getTipoSlug()];
    }

    // ============ AUTH ============
    function login() {
      const input = document.getElementById('passwordInput');
      if (!input) return;
      const pass = input.value.trim();
      if (pass !== PW_PC) { alert('Contraseña incorrecta.'); return; }
      sessionStorage.setItem(NIVEL_SESSION_KEY, 'pc');
      sessionStorage.setItem(AUTH_SESSION_KEY, 'ok');
      state.autenticado = true;
      cargarDatos();
    }

    function logout() {
      sessionStorage.removeItem(NIVEL_SESSION_KEY);
      sessionStorage.removeItem(AUTH_SESSION_KEY);
      state.autenticado = false;
      render();
    }

    // ============ FETCH ============
    async function fetchJsonOrThrow(url, options) {
      const resp = await fetch(url, options);
      const text = await resp.text();
      const ct = (resp.headers.get('content-type') || '').toLowerCase();
      const t = text.trim().toLowerCase();
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      if (ct.includes('text/html') || t.startsWith('<!doctype html') || t.startsWith('<html'))
        throw new Error('Backend no disponible.');
      try { return JSON.parse(text); } catch (e) { throw new Error('Respuesta inválida.'); }
    }

    // ============ CARGAR DATOS DEL SISTEMA ============
    async function cargarDatos() {
      state.cargando = true;
      state.mensaje = 'Cargando datos del sistema...';
      render();

      try {
        const [padronResp, resumenData] = await Promise.all([
          fetch(PADRON_CSV_URL),
          fetchJsonOrThrow(API_URL + '?action=resumen&v=' + Date.now()).catch(() => ({ mesas: [] }))
        ]);

        const text = await padronResp.text();
        const lineas = text.split('\n').filter(l => l.trim());

        const electoresPorMesa = {};
        let totalElectores = 0;
        const mesasSet = new Set();

        for (let i = 1; i < lineas.length; i++) {
          const p = lineas[i].split(',');
          if (p.length >= 8) {
            const mesa = parseInt(p[3].trim()) || 0;
            if (!electoresPorMesa[mesa]) electoresPorMesa[mesa] = 0;
            electoresPorMesa[mesa]++;
            totalElectores++;
            mesasSet.add(mesa);
          }
        }

        state.electoresPorMesa = electoresPorMesa;
        state.totalElectores = totalElectores;
        state.mesas = Array.from(mesasSet).sort((a, b) => a - b);

        if (!state.mesa || !electoresPorMesa[state.mesa]) {
          state.mesa = state.mesas[0] || 1;
        }

        if (resumenData && resumenData.mesas) {
          const mesaData = resumenData.mesas.find(m => parseInt(m.mesa) === state.mesa);
          state.totalVotosSistema = mesaData ? (parseInt(mesaData.votos) || 0) : 0;
          state.totalRegistros = mesaData ? (parseInt(mesaData.total) || 0) : 0;

          // Totales generales (ambos tipos comparten estos datos del sistema)
          let totalVotos = 0;
          let totalProc = 0;
          for (const m of resumenData.mesas) {
            totalVotos += parseInt(m.votos) || 0;
            totalProc++;
          }
          state.general.intendente.mesasInstaladas = resumenData.mesas.length;
          state.general.intendente.mesasProcesadas = totalProc;
          state.general.intendente.votosSistema = totalVotos;
          state.general.junta.mesasInstaladas = resumenData.mesas.length;
          state.general.junta.mesasProcesadas = totalProc;
          state.general.junta.votosSistema = totalVotos;
        }

        state.cargando = false;
        state.mensaje = `✅ ${state.mesas.length} mesas · ${totalElectores} electores`;
      } catch (e) {
        state.cargando = false;
        state.mensaje = '⚠️ Error: ' + (e.message || 'No se pudieron cargar datos');
      }
      render();
    }

    // ============ CAMBIAR TIPO ============
    function cambiarTipo(tipo) {
      if (tipo === state.tipo) return;
      state.tipo = tipo;
      initEscrutinioVotos();
      state.editMode = false;
      state.vista = 'certificado';

      // Recargar datos de la mesa actual
      fetchJsonOrThrow(API_URL + '?action=resumen&v=' + Date.now()).then(d => {
        if (d && d.mesas) {
          const m = d.mesas.find(x => parseInt(x.mesa) === state.mesa);
          state.totalVotosSistema = m ? (parseInt(m.votos) || 0) : 0;
          state.totalRegistros = m ? (parseInt(m.total) || 0) : 0;
        }
        render();
      }).catch(() => render());
      render();
    }

    // ============ SELECCIONAR MESA ============
    function seleccionarMesa() {
      const input = document.getElementById('mesaInput');
      if (!input) return;
      const mesa = parseInt(input.value);
      if (!mesa || mesa < 1) { alert('Ingrese un número de mesa válido.'); return; }
      state.mesa = mesa;
      state.totalVotosSistema = 0;
      state.totalRegistros = 0;
      initEscrutinioVotos();
      state.vista = 'certificado';
      fetchJsonOrThrow(API_URL + '?action=resumen&v=' + Date.now()).then(d => {
        if (d && d.mesas) {
          const m = d.mesas.find(x => parseInt(x.mesa) === mesa);
          state.totalVotosSistema = m ? (parseInt(m.votos) || 0) : 0;
          state.totalRegistros = m ? (parseInt(m.total) || 0) : 0;
        }
        render();
      }).catch(() => render());
      render();
    }

    // ============ CARGAR EJEMPLO MESA 12 ============
    function cargarEjemplo() {
      state.mesa = 12;
      initEscrutinioVotos();
      if (state.tipo === 'intendente') {
        state.escrutinio.votos[2] = 60;
        state.escrutinio.votos[7] = 68;
        state.escrutinio.votos[300] = 3;
        state.escrutinio.vac = 3;
      } else {
        state.escrutinio.votos[201] = 100;
        state.escrutinio.votos[202] = 25;
        state.escrutinio.votos[210] = 70;
        state.escrutinio.votos[4] = 5;
        state.escrutinio.votos[5] = 3;
        state.escrutinio.votos[6] = 15;
        state.escrutinio.nulos = 1;
        state.escrutinio.blanco = 6;
        state.escrutinio.vac = 2;
      }
      state.editMode = false;
      state.vista = 'certificado';
      fetchJsonOrThrow(API_URL + '?action=resumen&v=' + Date.now()).then(d => {
        if (d && d.mesas) {
          const m = d.mesas.find(x => parseInt(x.mesa) === 12);
          state.totalVotosSistema = m ? (parseInt(m.votos) || 0) : 0;
          state.totalRegistros = m ? (parseInt(m.total) || 0) : 0;
        }
        render();
      }).catch(() => render());
      render();
    }

    // ============ CALCULAR TOTALES ============
    function totalEscrutinio() {
      let t = state.escrutinio.nulos + state.escrutinio.blanco + state.escrutinio.vac;
      getAgrupaciones().forEach(a => { t += (parseInt(state.escrutinio.votos[a.nro]) || 0); });
      return t;
    }

    function totalPartidos() {
      let t = 0;
      getAgrupaciones().forEach(a => { t += (parseInt(state.escrutinio.votos[a.nro]) || 0); });
      return t;
    }

    // ============ EDITAR ============
    function toggleEdit() {
      state.editMode = !state.editMode;
      render();
    }

    function applyEdits() {
      for (const a of getAgrupaciones()) {
        const el = document.getElementById('voto_' + a.nro);
        if (el) state.escrutinio.votos[a.nro] = parseInt(el.value) || 0;
      }
      const nulosEl = document.getElementById('voto_nulos');
      const blcEl = document.getElementById('voto_blanco');
      const vacEl = document.getElementById('voto_vac');
      if (nulosEl) state.escrutinio.nulos = parseInt(nulosEl.value) || 0;
      if (blcEl) state.escrutinio.blanco = parseInt(blcEl.value) || 0;
      if (vacEl) state.escrutinio.vac = parseInt(vacEl.value) || 0;
      state.editMode = false;
      render();
    }

    function actualizarTotalEdit() {
      let t = 0;
      for (const a of getAgrupaciones()) {
        const el = document.getElementById('voto_' + a.nro);
        if (el) t += parseInt(el.value) || 0;
      }
      const nulosEl = document.getElementById('voto_nulos');
      const blcEl = document.getElementById('voto_blanco');
      const vacEl = document.getElementById('voto_vac');
      if (nulosEl) t += parseInt(nulosEl.value) || 0;
      if (blcEl) t += parseInt(blcEl.value) || 0;
      if (vacEl) t += parseInt(vacEl.value) || 0;
      const display = document.getElementById('totalEditDisplay');
      if (display) display.textContent = t;
    }

    // ============ CAMBIAR VISTA ============
    function setVista(v) {
      state.vista = v;
      render();
    }

    // ============ APLICAR GENERALES ============
    function aplicarGenerales() {
      const g = getGeneral();
      const get = id => parseInt(document.getElementById(id)?.value) || 0;
      if (state.tipo === 'intendente') {
        g.votosLista2 = get('gen_lista2');
        g.votosLista7 = get('gen_lista7');
        g.votosLista300 = get('gen_lista300');
      } else {
        g.votosLista2A = get('gen_lista2a');
        g.votosLista2B = get('gen_lista2b');
        g.votosLista2K = get('gen_lista2k');
        g.votosLista4 = get('gen_lista4');
        g.votosLista5 = get('gen_lista5');
        g.votosLista6 = get('gen_lista6');
      }
      g.nulos = get('gen_nulos');
      g.blanco = get('gen_blanco');
      g.vac = get('gen_vac');
      render();
    }

    // ============ PREFERENCIAS ============
    function abrirPreferencias(listaNro) {
      state.preferenciasLista = listaNro;
      render();
    }

    function cerrarPreferencias() {
      state.preferenciasLista = null;
      render();
    }

    function guardarPreferenciasEdit() {
      const lista = state.preferenciasLista;
      if (!lista) return;
      const rows = document.querySelectorAll('#pref-table tbody tr');
      const datos = [];
      rows.forEach(row => {
        const orden = parseInt(row.querySelector('.pref-orden')?.value) || 0;
        const nombre = row.querySelector('.pref-nombre')?.value?.trim() || '';
        const votos = parseInt(row.querySelector('.pref-votos')?.value) || 0;
        if (nombre) datos.push({ orden, nombre, votos });
      });
      state.preferencias[lista] = datos.sort((a, b) => (a.orden || 0) - (b.orden || 0));
      state.preferenciasLista = null;
      render();
    }

    function toggleEditPref() {
      state.editMode = !state.editMode;
      render();
    }

    function renderPreferenciasModal() {
      const lista = state.preferenciasLista;
      if (!lista) return '';
      const candidatos = getPreferencias(lista);
      const agrupacion = getAgrupaciones().find(a => a.nro === lista);
      const nombreLista = agrupacion ? agrupacion.nombre : 'Lista ' + lista;
      const totalPref = candidatos.reduce((s, c) => s + (c.votos || 0), 0);
      const editando = state.editMode;

      return `
      <div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;" class="no-print" onclick="if(event.target===this) cerrarPreferencias()">
        <div style="background:#fff;border-radius:16px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #e2e8f0;background:#f8fafc;border-radius:16px 16px 0 0;">
            <div>
              <h2 style="font-size:16px;font-weight:900;margin:0;color:#1e293b;text-transform:uppercase;">${nombreLista}</h2>
              <p style="font-size:11px;color:#64748b;margin:2px 0 0 0;">Votos Preferenciales · Total: <strong>${totalPref.toLocaleString()}</strong></p>
            </div>
            <button onclick="cerrarPreferencias()" style="width:32px;height:32px;border:none;border-radius:50%;background:#e2e8f0;cursor:pointer;font-size:16px;color:#475569;display:flex;align-items:center;justify-content:center;">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <div style="padding:16px 20px;">
            <table id="pref-table" style="width:100%;border-collapse:collapse;font-size:13px;">
              <thead>
                <tr style="background:#f1f5f9;">
                  <th style="padding:8px;text-align:center;width:50px;font-size:10px;text-transform:uppercase;color:#64748b;">#</th>
                  <th style="padding:8px;text-align:center;width:60px;font-size:10px;text-transform:uppercase;color:#64748b;">Orden</th>
                  <th style="padding:8px;text-align:left;font-size:10px;text-transform:uppercase;color:#64748b;">Nombre del Candidato</th>
                  <th style="padding:8px;text-align:center;width:100px;font-size:10px;text-transform:uppercase;color:#64748b;">Preferencias</th>
                </tr>
              </thead>
              <tbody>
                ${candidatos.length > 0 ? candidatos.map((c, i) => `
                  <tr style="border-bottom:1px solid #e2e8f0;">
                    <td style="padding:8px;text-align:center;font-weight:700;color:#94a3b8;">${i + 1}</td>
                    <td style="padding:8px;text-align:center;">
                      ${editando
                        ? `<input type="number" class="pref-orden" value="${c.orden || i + 1}" min="0" style="width:50px;padding:4px;border:1px solid #cbd5e1;border-radius:4px;text-align:center;font-weight:700;">`
                        : `<span style="font-weight:700;">${c.orden}</span>`
                      }
                    </td>
                    <td style="padding:8px;text-align:left;font-weight:600;">
                      ${editando
                        ? `<input type="text" class="pref-nombre" value="${c.nombre}" style="width:100%;padding:4px 8px;border:1px solid #cbd5e1;border-radius:4px;">`
                        : c.nombre
                      }
                    </td>
                    <td style="padding:8px;text-align:center;font-weight:900;font-size:15px;">
                      ${editando
                        ? `<input type="number" class="pref-votos" value="${c.votos}" min="0" style="width:80px;padding:4px;border:1px solid #cbd5e1;border-radius:4px;text-align:center;font-weight:900;">`
                        : c.votos.toLocaleString()
                      }
                    </td>
                  </tr>
                `).join('') : `
                  <tr><td colspan="4" style="padding:20px;text-align:center;color:#94a3b8;">Sin datos de preferencias</td></tr>
                `}
              </tbody>
            </table>

            ${editando ? `

    // ============ EXPORTAR ============
    function exportCSV() {
      const slug = getTipoSlug();
      const agrs = getAgrupaciones();
      const rows = [['Agrupacion', 'Nro', 'Votos']];
      agrs.forEach(a => {
        const v = parseInt(state.escrutinio.votos[a.nro]) || 0;
        if (v > 0) rows.push([a.nombre, a.nro, v]);
      });
      rows.push(['Nulos', '', state.escrutinio.nulos]);
      rows.push(['Blanco', '', state.escrutinio.blanco]);
      rows.push(['VAC', '', state.escrutinio.vac]);
      rows.push(['TOTAL', '', totalEscrutinio()]);

      const csv = rows.map(r => r.join(',')).join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'escrutinio_' + slug + '_mesa' + state.mesa + '_' + new Date().toISOString().slice(0, 10) + '.csv';
      a.click();
    }
